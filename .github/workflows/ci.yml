name: CI

env:
  # Opt into Node.js 24 for JavaScript-based actions to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  test:
    name: Test (linux, macOS)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: [1.26, 1.25]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go }}
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          # Use go.mod as the dependency file (go.sum may be absent on some branches)
          key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-
            ${{ runner.os }}-go-
      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Run tidy (make tidy)
        run: |
          make tidy
      - name: Build and test
        run: |
          go vet ./...
          staticcheck ./...
          go test ./... -v
      - name: Run gofmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then echo "gofmt needs to be run"; gofmt -l .; exit 1; fi
