name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  go:
    name: Go test (1.25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      - name: Cache modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-1.25-${{ hashFiles('**/go.sum') }}
      - name: Install staticcheck (optional)
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Run tests
        run: go test ./...
      - name: Run staticcheck (non-failing)
        run: staticcheck ./... || true
